name: Run Stress Test

on:
  schedule:
    - cron: "*/5 * * * *"   # 🔥 runs every 5 minutes (24x7)
  workflow_dispatch:        # manual run button

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Run script
        run: node Index.js
